version: 2

models:
  - name: stg_precios_cripto
    description: "Vista de staging: raw.precios_cripto limpio y con nombres consistentes."
    columns:
      - name: id
        description: "PK de la fila de precio."
        data_tests:
          - unique
          - not_null
      - name: symbol
        description: "Nombre de la criptomoneda (bitcoin, ethereum, solana)."
        data_tests:
          - not_null
      - name: price_usd
        description: "Precio en USD, redondeado a 2 decimales."
        data_tests:
          - not_null
